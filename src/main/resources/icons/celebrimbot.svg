<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="deepGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#0d1d2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050a11;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aabfdf;stop-opacity:1" />
    </linearGradient>
    <filter id="epicoGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="100" cy="100" r="95" fill="none" stroke="#5da9e1" stroke-width="3" filter="url(#epicoGlow)" />
  <path d="M100,10 A90,90 0 0,1 190,100 M100,190 A90,90 0 0,1 10,100" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="8 4"/>

  <g transform="translate(60, 50)" filter="url(#epicoGlow)">
    
    <path d="M40,50 L40,110 Q40,120 30,120 Q20,120 20,110 L20,50 Z" fill="#b0c4de" stroke="#5da9e1" stroke-width="2"/>
    <line x1="30" y1="60" x2="30" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="25" y1="70" x2="25" y2="90" stroke="#fff" stroke-width="0.8"/>
    <line x1="35" y1="70" x2="35" y2="90" stroke="#fff" stroke-width="0.8"/>
    
    <path d="M10,20 L50,20 Q60,20 60,30 L60,50 Q60,60 50,60 L10,60 Q0,60 0,50 L0,30 Q0,20 10,20 Z" fill="#778899" stroke="#5da9e1" stroke-width="2.5"/>
    
    <circle cx="30" cy="40" r="12" fill="#1c4266" stroke="#fff" stroke-width="1.5"/>
    
    <polygon points="30,22 33,33 44,30 36,37 46,47 34,43 30,58 26,43 14,47 24,37 16,30 27,33" fill="#fff"/>
    <polygon points="30,15 35,32 50,28 39,39 52,52 36,46 30,68 24,46 8,52 21,39 10,28 25,32" fill="none" stroke="#fff" stroke-width="1"/>

    <circle cx="30" cy="40" r="6" fill="#fff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="30" cy="40" r="3" fill="#5da9e1">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite" />
    </circle>

  </g>

  <text x="100" y="185" text-anchor="middle" font-family="Papyrus, Cursive" font-size="14" fill="url(#textGrad)" font-weight="bold" filter="url(#epicoGlow)">CELEBRIMBOT</text>
  
</svg>
